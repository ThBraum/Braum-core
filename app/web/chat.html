<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Braum Chat</title>
        <style>
      :root {
        --bg: #0b0f17;
        --panel: #131a26;
        --panel-soft: #171f2d;
        --panel-hover: #1d2839;
        --border: #263247;
        --text: #e7edf7;
        --muted: #9fb0c8;
        --brand: #3b82f6;
        --brand-2: #2563eb;
        --danger: #ef4444;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(1200px 500px at 50% -10%, #152136 0%, var(--bg) 55%);
        color: var(--text);
      }

      .app {
        height: 100%;
        display: grid;
        grid-template-columns: 286px 1fr;
      }

      .sidebar {
        border-right: 1px solid var(--border);
        background: linear-gradient(180deg, #111827 0%, #0d1420 100%);
        padding: 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #60a5fa;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: 0.3px;
      }

      .logo-mark {
        width: 30px;
        height: 30px;
        border-radius: 9px;
        border: 2px solid #60a5fa;
        position: relative;
        transform: rotate(45deg);
        background: rgba(96, 165, 250, 0.08);
      }

      .logo-mark::before,
      .logo-mark::after {
        content: "";
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #60a5fa;
      }

      .logo-mark::before { left: 7px; }
      .logo-mark::after { right: 7px; }

      .menu {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .menu-btn {
        width: 100%;
        border: 1px solid transparent;
        background: transparent;
        color: var(--text);
        border-radius: 10px;
        padding: 10px 10px;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        font-size: 14px;
      }

      .menu-btn:hover {
        border-color: var(--border);
        background: rgba(31, 41, 55, 0.35);
      }

      .menu-icon {
        width: 24px;
        height: 24px;
        border: 1px solid #445570;
        border-radius: 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #c7d2e8;
      }

      .title {
        color: #a8b5ca;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: .06em;
        text-transform: uppercase;
        margin-top: 8px;
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
        max-height: 280px;
      }

      .list-item {
        border: 1px solid var(--border);
        background: #0f1622;
        border-radius: 10px;
        padding: 9px 10px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 14px;
      }

      .list-item small { color: var(--muted); }
      .list-item.active { border-color: #4d6ea6; background: #122038; }

      .files-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
        max-height: 160px;
        overflow-y: auto;
      }

      .file-chip {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 8px;
        background: #0f1622;
        color: #c7d2e8;
        font-size: 12px;
      }

      .danger-btn {
        border: 1px solid #7f1d1d;
        background: rgba(127, 29, 29, 0.18);
        color: #fecaca;
        border-radius: 10px;
        padding: 9px 10px;
        width: 100%;
        cursor: pointer;
      }

      .auth-box {
        margin-top: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        background: #0f1622;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .auth-box.disabled {
        opacity: .6;
        filter: grayscale(0.2);
      }

      .auth-row { display: flex; gap: 8px; }

      .auth-row input {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #121b2a;
        color: var(--text);
        padding: 8px;
      }

      .auth-row input:disabled,
      .auth-row button:disabled {
        cursor: not-allowed;
        opacity: .65;
      }

      .auth-row button {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #15233b;
        color: var(--text);
        padding: 8px 12px;
        cursor: pointer;
      }

      .main {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .topbar {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 24px;
        border-bottom: 1px solid var(--border);
      }

      .topbar-title {
        font-size: 18px;
        color: #d7e3f8;
        font-weight: 600;
      }

      .workspace {
        flex: 1;
        display: grid;
        grid-template-rows: auto 1fr auto;
        overflow: hidden;
      }

      .hero {
        margin-top: 8vh;
        text-align: center;
        color: #d6e3f8;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 42px);
        font-weight: 700;
      }

      .hero p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .chat-feed {
        width: min(980px, calc(100% - 28px));
        margin: 14px auto;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 0 4px 10px;
      }

      .bubble {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 14px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .bubble.user { background: #163058; margin-left: 10%; }
      .bubble.assistant { background: #121b2a; margin-right: 10%; }

      .sources {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .source-chip {
        border: 1px solid #395074;
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 12px;
        color: #cdd9ec;
      }

      .composer-wrap {
        padding: 10px 16px 16px;
        border-top: 1px solid var(--border);
        background: rgba(11, 15, 23, .9);
        backdrop-filter: blur(8px);
      }

      .composer-card {
        width: min(760px, calc(100% - 6px));
        margin: 0 auto;
        border: 1px solid #31415f;
        border-radius: 24px;
        background: #101827;
        padding: 12px;
        box-shadow: 0 10px 28px rgba(0,0,0,.28);
      }

      .composer-input {
        width: 100%;
        border: none;
        background: transparent;
        color: var(--text);
        resize: none;
        min-height: 80px;
        max-height: 180px;
        font-size: 28px;
        line-height: 1.35;
        outline: none;
      }

      .composer-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
        gap: 10px;
      }

      .mode-switch {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .mode-btn {
        width: 42px;
        height: 42px;
        border: 1px solid #3b4b68;
        border-radius: 13px;
        background: #17243b;
        color: #bdd0ef;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .mode-btn.active {
        background: #2563eb;
        border-color: #2563eb;
        color: white;
      }

      .mode-hint {
        background: #2563eb;
        color: #fff;
        border-radius: 12px;
        padding: 8px 12px;
        font-size: 13px;
        margin-left: 4px;
      }

      .right-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        border: 1px solid #364a6b;
        background: #15223a;
        color: #d7e4fb;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .send-btn {
        background: #2f7af6;
        border-color: #2f7af6;
        font-size: 17px;
      }

      .web-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .web-toggle input {
        width: 14px;
        height: 14px;
        accent-color: #2f7af6;
      }

      .thumbs {
        width: min(760px, calc(100% - 6px));
        margin: 8px auto 0;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .thumb {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0f1622;
        padding: 7px 9px;
        font-size: 12px;
        color: #d1d9ea;
      }

      .status {
        width: min(760px, calc(100% - 6px));
        margin: 8px auto 0;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 1040px) {
        .app { grid-template-columns: 1fr; }
        .sidebar { display: none; }
        .bubble.user, .bubble.assistant { margin: 0; }
      }
    </style>
    </head>
    <body>
        <div class="app">
            <aside class="sidebar">
                <div class="logo"><span
                        class="logo-mark"></span><span>BraumAI</span></div>

                <div class="menu">
                    <button class="menu-btn" id="newConversationBtn"><span
                            class="menu-icon">✎</span><span>Nova
                            Conversa</span></button>
                    <button class="menu-btn"><span
                            class="menu-icon">💬</span><span>Conversas</span></button>
                    <button class="menu-btn"><span
                            class="menu-icon">📚</span><span>Fontes</span></button>
                </div>

                <div class="title">Recentes</div>
                <div class="list" id="conversationList"></div>

                <button class="danger-btn" id="deleteConversationBtn">Apagar
                    conversa atual</button>

                <div class="title">Fontes Internas</div>
                <div class="files-grid" id="documentsList"></div>
                <div class="files-grid" id="tablesList"></div>

                <div class="auth-box disabled">
                    <div class="status" id="authStatus">Autenticação
                        desativada</div>
                    <div class="auth-row">
                        <input id="authUserInput"
                            placeholder="Autenticação indisponível" disabled />
                        <button id="authBtn" disabled>Indisponível</button>
                    </div>
                </div>
            </aside>

            <main class="main">
                <header class="topbar">
                    <div class="topbar-title" id="conversationTitle">Nova
                        conversa</div>
                    <div class="status" style="margin:0">Interface BraumAI
                        (dark)</div>
                </header>

                <section class="workspace">
                    <div class="hero" id="heroSection">
                        <h1>Como posso te ajudar hoje?</h1>
                        <p>Pergunte ao assistente e escolha o modo no painel
                            abaixo.</p>
                    </div>

                    <section class="chat-feed" id="chatBox"></section>

                    <footer class="composer-wrap">
                        <div class="composer-card">
                            <textarea id="messageInput" class="composer-input"
                                placeholder="Pergunte ao BraumAI"></textarea>

                            <div class="composer-actions">
                                <div class="mode-switch">
                                    <button id="modeGeneralBtn" class="mode-btn"
                                        title="Geral">✦</button>
                                    <button id="modeRagBtn" class="mode-btn"
                                        title="Consulte fontes internas">📚</button>
                                    <button id="modeSqlBtn" class="mode-btn"
                                        title="Tabelas SQL">🗃️</button>
                                    <span id="modeHint"
                                        class="mode-hint">Converse sobre
                                        assuntos gerais</span>
                                </div>

                                <div class="right-actions">
                                    <label class="web-toggle"
                                        id="webSearchToggleWrap"
                                        title="Busca web no modo Geral">
                                        <input type="checkbox"
                                            id="webSearchToggle" /> Web
                                    </label>
                                    <input type="file" id="fileInput" hidden />
                                    <button id="uploadBtn" class="icon-btn"
                                        title="Enviar arquivo">📎</button>
                                    <button id="sendBtn"
                                        class="icon-btn send-btn"
                                        title="Enviar">↑</button>
                                </div>
                            </div>
                        </div>

                        <div class="thumbs" id="thumbs"></div>
                        <div class="status" id="statusLine"></div>
                    </footer>
                </section>
            </main>
        </div>

        <script>
      const state = {
        clientId: localStorage.getItem('braum.clientId') || crypto.randomUUID(),
        accessToken: localStorage.getItem('braum.accessToken') || '',
        currentConversationId: null,
        mode: 'general',
        webSearchEnabled: localStorage.getItem('braum.webSearchEnabled') === 'true',
      };

      localStorage.setItem('braum.clientId', state.clientId);

      const chatBox = document.getElementById('chatBox');
      const heroSection = document.getElementById('heroSection');
      const statusLine = document.getElementById('statusLine');
      const conversationTitle = document.getElementById('conversationTitle');
      const conversationList = document.getElementById('conversationList');
      const documentsList = document.getElementById('documentsList');
      const tablesList = document.getElementById('tablesList');
      const thumbs = document.getElementById('thumbs');
      const authStatus = document.getElementById('authStatus');
      const webSearchToggle = document.getElementById('webSearchToggle');
      const webSearchToggleWrap = document.getElementById('webSearchToggleWrap');
      const modeHint = document.getElementById('modeHint');

      const modeButtons = {
        general: document.getElementById('modeGeneralBtn'),
        rag: document.getElementById('modeRagBtn'),
        sql: document.getElementById('modeSqlBtn'),
      };

      const modeHints = {
        general: 'Converse sobre assuntos gerais',
        rag: 'Consulte fontes internas',
        sql: 'Analise tabelas SQL',
      };

      function setStatus(message) {
        statusLine.textContent = message || '';
      }

      function authParams() {
        const params = new URLSearchParams({ client_id: state.clientId });
        if (state.accessToken) params.set('access_token', state.accessToken);
        return params;
      }

      function authBody() {
        return {
          client_id: state.clientId,
          access_token: state.accessToken || null,
        };
      }

      async function api(path, options = {}) {
        const response = await fetch(path, options);
        if (!response.ok) {
          let detail = 'Erro na requisição';
          try {
            const payload = await response.json();
            detail = payload.detail || payload.error?.message || detail;
          } catch (_) {}
          throw new Error(detail);
        }
        if (response.status === 204) return null;
        return response.json();
      }

      function refreshHeroVisibility() {
        const hasMessages = chatBox.children.length > 0;
        heroSection.style.display = hasMessages ? 'none' : 'block';
      }

      function applyModeVisuals() {
        Object.entries(modeButtons).forEach(([mode, button]) => {
          button.classList.toggle('active', state.mode === mode);
        });
        modeHint.textContent = modeHints[state.mode] || modeHints.general;

        const isGeneral = state.mode === 'general';
        webSearchToggle.disabled = !isGeneral;
        webSearchToggleWrap.style.opacity = isGeneral ? '1' : '.5';
      }

      async function setMode(mode, syncServer = true) {
        state.mode = mode;
        applyModeVisuals();

        if (!syncServer || !state.currentConversationId) return;

        try {
          const params = authParams();
          await api(`/api/v1/workspace/conversations/${state.currentConversationId}?${params.toString()}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mode }),
          });
          await refreshConversations();
          setStatus(`Modo alterado para ${mode.toUpperCase()}.`);
        } catch (error) {
          setStatus(error.message);
        }
      }

      function appendBubble(role, text, sources = []) {
        const bubble = document.createElement('article');
        bubble.className = `bubble ${role}`;
        bubble.textContent = text;

        if (sources.length > 0) {
          const sourceBox = document.createElement('div');
          sourceBox.className = 'sources';
          sources.forEach((src) => {
            const chip = document.createElement('span');
            chip.className = 'source-chip';
            chip.textContent = src.title || src.file || src.table || src.excerpt || 'fonte';
            sourceBox.appendChild(chip);
          });
          bubble.appendChild(sourceBox);
        }

        chatBox.appendChild(bubble);
        chatBox.scrollTop = chatBox.scrollHeight;
        refreshHeroVisibility();
      }

      function renderThumbs(items) {
        thumbs.innerHTML = '';
        items.forEach((item) => {
          const row = document.createElement('div');
          row.className = 'thumb';
          row.textContent = `${item.thumbnail || '📎'} ${item.original_name}`;
          thumbs.appendChild(row);
        });
      }

      async function refreshDocumentsAndTables() {
        const params = authParams();
        const [documents, tables] = await Promise.all([
          api(`/api/v1/workspace/files/documents?${params.toString()}`),
          api(`/api/v1/workspace/files/tables?${params.toString()}`),
        ]);

        documentsList.innerHTML = '';
        tablesList.innerHTML = '';

        documents.slice(0, 6).forEach((file) => {
          const item = document.createElement('div');
          item.className = 'file-chip';
          item.textContent = `${file.thumbnail} ${file.original_name}`;
          documentsList.appendChild(item);
        });

        tables.slice(0, 6).forEach((file) => {
          const item = document.createElement('div');
          item.className = 'file-chip';
          item.textContent = `${file.thumbnail} ${file.original_name}`;
          tablesList.appendChild(item);
        });
      }

      async function refreshConversations() {
        const params = authParams();
        const data = await api(`/api/v1/workspace/conversations?${params.toString()}`);
        conversationList.innerHTML = '';

        data.forEach((conversation) => {
          const item = document.createElement('div');
          item.className = `list-item ${conversation.id === state.currentConversationId ? 'active' : ''}`;
          item.innerHTML = `<span>${conversation.title}</span><small>${conversation.mode.toUpperCase()}</small>`;
          item.onclick = async () => {
            state.currentConversationId = conversation.id;
            conversationTitle.textContent = conversation.title;
            await setMode(conversation.mode, false);
            await refreshConversations();
            await loadMessages();
          };
          conversationList.appendChild(item);
        });
      }

      async function loadMessages() {
        if (!state.currentConversationId) {
          chatBox.innerHTML = '';
          refreshHeroVisibility();
          return;
        }

        const params = authParams();
        const messages = await api(`/api/v1/workspace/conversations/${state.currentConversationId}/messages?${params.toString()}`);
        chatBox.innerHTML = '';
        messages.forEach((message) => {
          appendBubble(message.role === 'user' ? 'user' : 'assistant', message.content, message.sources || []);
        });
        refreshHeroVisibility();
      }

      async function createConversation() {
        const body = {
          mode: state.mode,
          title: 'Nova conversa',
          ...authBody(),
        };

        const conversation = await api('/api/v1/workspace/conversations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        state.currentConversationId = conversation.id;
        conversationTitle.textContent = conversation.title;
        chatBox.innerHTML = '';
        refreshHeroVisibility();
        await refreshConversations();
        setStatus(`Conversa criada em modo ${conversation.mode.toUpperCase()}.`);
      }

      async function sendMessage() {
        const input = document.getElementById('messageInput');
        const content = input.value.trim();
        if (!content) return;

        if (!state.currentConversationId) {
          await createConversation();
        }

        appendBubble('user', content);
        input.value = '';
        setStatus('Gerando resposta...');

        try {
          const payload = await api(`/api/v1/workspace/conversations/${state.currentConversationId}/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              content,
              web_search_enabled: state.mode === 'general' ? state.webSearchEnabled : false,
              ...authBody(),
            }),
          });

          appendBubble('assistant', payload.answer, payload.sources || []);
          renderThumbs(payload.uploaded_files || []);

          if (payload.requires_login) {
            setStatus('Autenticação necessária para RAG/SQL.');
          } else {
            setStatus('Resposta recebida.');
          }

          await refreshConversations();
        } catch (error) {
          appendBubble('assistant', `Erro: ${error.message}`);
          setStatus(error.message);
        }
      }

      async function uploadCurrentFile(file) {
        if (!state.currentConversationId) {
          await createConversation();
        }

        if ((state.mode === 'rag' || state.mode === 'sql') && !state.accessToken) {
          throw new Error('Faça autenticação para enviar arquivos em RAG/SQL.');
        }

        const formData = new FormData();
        formData.append('conversation_id', state.currentConversationId);
        formData.append('mode', state.mode);
        formData.append('file', file);
        formData.append('client_id', state.clientId);
        if (state.accessToken) formData.append('access_token', state.accessToken);

        const fileRow = await api('/api/v1/workspace/files/upload', {
          method: 'POST',
          body: formData,
        });

        renderThumbs([fileRow]);
        appendBubble('assistant', `Arquivo ${fileRow.original_name} anexado com sucesso.`);
        await refreshDocumentsAndTables();
        setStatus('Arquivo enviado.');
      }

      async function authenticate() {
        setStatus('Autenticação desativada nesta interface.');
      }

      document.getElementById('newConversationBtn').onclick = createConversation;
      document.getElementById('sendBtn').onclick = sendMessage;
      document.getElementById('authBtn').onclick = authenticate;

      document.getElementById('deleteConversationBtn').onclick = async () => {
        if (!state.currentConversationId) return;
        const params = authParams();
        await api(`/api/v1/workspace/conversations/${state.currentConversationId}?${params.toString()}`, { method: 'DELETE' });
        state.currentConversationId = null;
        chatBox.innerHTML = '';
        renderThumbs([]);
        refreshHeroVisibility();
        await refreshConversations();
        setStatus('Conversa apagada.');
      };

      modeButtons.general.onclick = () => setMode('general');
      modeButtons.rag.onclick = () => setMode('rag');
      modeButtons.sql.onclick = () => setMode('sql');

      document.getElementById('messageInput').addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });

      webSearchToggle.checked = state.webSearchEnabled;
      webSearchToggle.onchange = (event) => {
        state.webSearchEnabled = event.target.checked;
        localStorage.setItem('braum.webSearchEnabled', String(state.webSearchEnabled));
        setStatus(state.webSearchEnabled ? 'Busca web ativada no modo Geral.' : 'Busca web desativada no modo Geral.');
      };

      document.getElementById('uploadBtn').onclick = () => {
        if ((state.mode === 'rag' || state.mode === 'sql') && !state.accessToken) {
          setStatus('Para usar upload em RAG/SQL você precisa autenticar.');
          return;
        }
        document.getElementById('fileInput').click();
      };

      document.getElementById('fileInput').addEventListener('change', async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;

        try {
          await uploadCurrentFile(file);
        } catch (error) {
          setStatus(error.message);
        } finally {
          event.target.value = '';
        }
      });

      (async function init() {
        state.accessToken = '';
        localStorage.removeItem('braum.accessToken');
        authStatus.textContent = 'Autenticação desativada';

        applyModeVisuals();
        refreshHeroVisibility();
        await refreshConversations();
        await refreshDocumentsAndTables();
        setStatus('Pronto. Selecione um modo e envie sua pergunta.');
      })();
    </script>
    </body>
</html>
