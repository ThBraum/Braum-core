x-environment: &BRAUM_ENV
  APP_NAME: ${APP_NAME:-braum}
  APP_ENV: ${APP_ENV:-development}
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_VERSION: ${APP_VERSION:-0.0.1-dev}

  API_HOST: ${API_HOST:-0.0.0.0}
  API_PORT: ${API_PORT:-8000}

  SECRET_KEY: ${SECRET_KEY:-77WeHQ26273PZpkQvb7U2NT5dnTmIvVdDpWSkDEGT5Y=}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}

  POSTGRES_DB: ${POSTGRES_DB:-braum}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_DB: ${REDIS_DB:-0}

  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/braum}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}

  VECTOR_DB_PROVIDER: ${VECTOR_DB_PROVIDER:-qdrant}
  VECTOR_DB_URL: ${VECTOR_DB_URL:-http://qdrant:6333}

  STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
  STORAGE_BUCKET: ${STORAGE_BUCKET:-braum-files}
  STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
  STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minio}
  STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minio123}

  OPENAI_API_KEY: ${OPENAI_API_KEY:-empty}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
  OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}

  GUEST_SESSION_MAX_QUESTIONS: ${GUEST_SESSION_MAX_QUESTIONS:-10}
  GUEST_SESSION_TTL_SECONDS: ${GUEST_SESSION_TTL_SECONDS:-86400}

  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://localhost:5173}

x-braum-service: &BRAUM_SERVICE
  build:
    context: .
    dockerfile: Dockerfile
    args:
      DEV: ${DEV:-1}
      VERSION: ${APP_VERSION:-0.0.1-dev}
  restart: unless-stopped
  env_file:
    - .env
  environment:
    <<: *BRAUM_ENV
  volumes:
    - .:/app
    - braum_venv:/app/.venv
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  networks:
    - internal

services:
  postgres:
    image: postgres:16
    container_name: braum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-braum}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - ./.tmp/volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-braum}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: braum-redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - ./.tmp/volumes/redis:/data
    networks:
      - internal

  api:
    <<: *BRAUM_SERVICE
    container_name: braum-api
    environment:
      <<: *BRAUM_ENV
      APP_ROLE: api
    command: bash /app/exec/start.sh
    ports:
      - "${API_EXTERNAL_PORT:-8000}:8000"

  worker:
    <<: *BRAUM_SERVICE
    container_name: braum-worker
    environment:
      <<: *BRAUM_ENV
      APP_ROLE: worker
    command: bash /app/exec/start.sh

  flower:
    <<: *BRAUM_SERVICE
    container_name: braum-flower
    environment:
      <<: *BRAUM_ENV
      APP_ROLE: flower
    command: bash /app/exec/start.sh
    ports:
      - "${FLOWER_EXTERNAL_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_started

  qdrant:
    image: qdrant/qdrant:latest
    container_name: braum-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_EXTERNAL_PORT:-6333}:6333"
    volumes:
      - ./.tmp/volumes/qdrant:/qdrant/storage
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: braum-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minio123}
    ports:
      - "${MINIO_EXTERNAL_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_EXTERNAL_PORT:-9001}:9001"
    volumes:
      - ./.tmp/volumes/minio:/data
    networks:
      - internal

  # rabbitmq:
  #   image: rabbitmq:3-management
  #   container_name: braum-rabbitmq
  #   restart: unless-stopped
  #   environment:
  #     RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
  #     RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
  #   ports:
  #     - "${RABBITMQ_EXTERNAL_PORT:-5672}:5672"
  #     - "${RABBITMQ_MANAGEMENT_EXTERNAL_PORT:-15672}:15672"
  #   networks:
  #     - internal

networks:
  internal:

volumes:
  braum_venv: